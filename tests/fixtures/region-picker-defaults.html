<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Region Picker – Default Config</title>
  <link rel="stylesheet" href="/blocks/comms/region-picker/region-picker.css">
</head>
<body>
  <!--
    Block with no config rows – exercises fallback defaults:
    label="Region", placeholder="Select a region", options-key="regions".
  -->
  <div class="region-picker block" data-block-name="region-picker" data-block-status="initialized">
  </div>

  <script type="module">
    import decorate from '/blocks/comms/region-picker/region-picker.js';
    const block = document.querySelector('.region-picker.block');
    window.__decoratePromise = decorate(block);
    window.__decoratePromise
      .then(() => { window.__decorated = true; })
      .catch(() => { window.__decorated = true; });
  </script>
</body>
</html>
